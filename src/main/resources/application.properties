spring.config.import=optional:classpath:application-key.properties

spring.application.name=showcle-mvp-server

# SERVER INFO
server.address=localhost
server.port=8080

# MULTIPART
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1000MB
spring.servlet.multipart.max-request-size=1000MB

# UPLOAD PATH
server.file.storage-path=D://data/web/upload
server.file.web-path=/upload
spring.servlet.multipart.location=D://data/web/upload/temp

# MYBATIS CONFIG
mybatis.config-location=classpath:mybatis/config/mybatis-config.xml
mybatis.mapper-locations=classpath:mybatis/mapper/**/*.xml

# DATA SOURCE
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/showcle_mvp?options=-c%20timezone=Asia/Seoul
spring.datasource.username=showcle
spring.datasource.password=showcle

# LOGGING
logging.level.org.springframework=DEBUG
logging.level.com.showcle=DEBUG
logging.level.java.sql=DEBUG
logging.level.com.zaxxer.hikari=DEBUG

# SESSION TIMEOUT ( EMBED TOMCAT )
server.servlet.session.timeout=120m

# CORS SETTING
server.cors.allowed-origins=http://localhost:8080
server.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
server.cors.allowed-header=*

# SCHEDULER
scheduler.carry.over.active=false

# FFMPEG PATH
ffmpeg.path=D://Program/ffmpeg/bin

# Mail
spring.mail.sender=showcle2026@gamil.com
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=showcle2026
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.debug=true

# OAUTH2
# GOOGLE
# default login url=/oauth2/authorization/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# KAKAO
# default login url=/oauth2/authorization/kakao
spring.security.oauth2.client.registration.kakao.client-name=KAKAO
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.scope=account_email
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# APPLE
# default login url=/oauth2/authorization/apple